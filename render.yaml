services:
  - type: web
    name: blood-bank
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: blood-bank-db
          property: host
      - key: DB_USER
        fromDatabase:
          name: blood-bank-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: blood-bank-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: blood-bank-db
          property: database
      - key: DB_PORT
        fromDatabase:
          name: blood-bank-db
          property: port
      - key: SMS_TEST_MODE
        value: "false"
      - key: SMS_GATEWAY
        value: "whatsapp"
      - key: WHATSAPP_INSTANCE_ID
        value: "instance167562"
      - key: WHATSAPP_TOKEN
        value: "9c3xqttv7ilpqc1h"

databases:
  - name: blood-bank-db
    databaseName: bloodbank
    user: bloodbank
